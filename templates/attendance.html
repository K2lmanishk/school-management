{% extends "base.html" %}

{% block content %}
<h1 class="mt-4">Mark Attendance</h1>
<ol class="breadcrumb mb-4">
    <li class="breadcrumb-item"><a href="{{ url_for('faculty_dashboard') }}">Dashboard</a></li>
    <li class="breadcrumb-item active">Attendance</li>
</ol>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-check2-square"></i> Select Subject and Date</div>
    <div class="card-body">
        <form method="POST" id="attendanceForm">
            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <select class="form-select" name="subject_id" id="subjectSelect" required>
                            <option value="">Select Subject</option>
                            {% for assignment in assignments %}
                            <option value="{{ assignment.subject.id }}">{{ assignment.subject.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control" name="date" id="attendanceDate" required value="{{ today }}">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="mb-3">
                        <label class="form-label">&nbsp;</label>
                        <button type="button" class="btn btn-info d-block" onclick="loadStudentsForSubject()">
                            Load Students
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="studentList" style="display: none;">
                <hr>
                <h5>Student List</h5>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="table-dark">
                            <tr>
                                <th>Roll No</th>
                                <th>Student Name</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                        </tbody>
                    </table>
                </div>
                <button type="button" class="btn btn-success mb-2" onclick="markAllPresent()">Mark All Present</button>
                <button type="submit" class="btn btn-primary">Save Attendance</button>
            </div>
        </form>
    </div>
</div>

<script>
function loadStudentsForSubject() {
    var subjectId = document.getElementById('subjectSelect').value;
    if (!subjectId) {
        alert('Please select a subject');
        return;
    }
    
    fetch('/api/get_students_by_subject/' + subjectId)
        .then(response => response.json())
        .then(data => {
            var tbody = document.getElementById('studentTableBody');
            var html = '';
            data.forEach(student => {
                html += '<tr>' +
                    '<td>' + student.roll_no + '</td>' +
                    '<td>' + student.name + '</td>' +
                    '<td>' +
                        '<select class="form-select" name="status_' + student.id + '">' +
                            '<option value="Present" selected>Present</option>' +
                            '<option value="Absent">Absent</option>' +
                        '</select>' +
                    '</td>' +
                '</tr>';
            });
            tbody.innerHTML = html;
            document.getElementById('studentList').style.display = 'block';
        });
}

function markAllPresent() {
    var selects = document.querySelectorAll('#studentTableBody select');
    selects.forEach(select => select.value = 'Present');
}
</script>
{% endblock %}
