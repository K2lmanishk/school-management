services:
  - type: web
    name: kd-public-school
    runtime: python
    repo: https://github.com/YOUR_USERNAME/kd-public-school
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0